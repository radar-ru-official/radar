<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар - Интерактивная карта</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1c23;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #map-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #map-container:active {
            cursor: grabbing;
        }
        .region {
            fill: #2a2d37;
            stroke: #1a1c23;
            stroke-width: 0.5px;
            transition: fill 0.3s ease;
            cursor: pointer;
        }
        .region:hover {
            fill: #4682b4 !important;
            stroke: #ffffff;
            stroke-width: 1px;
        }
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(34, 37, 44, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
            min-width: 250px;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #333;
        }
        #panel-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }
        .alert-item {
            margin-bottom: 10px;
            line-height: 1.4;
            font-size: 14px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .alert-place {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .zoom-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .zoom-btn {
            background: rgba(34, 37, 44, 0.9);
            color: #fff;
            border: 1px solid #444;
            width: 45px;
            height: 45px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .zoom-btn:hover {
            background: #4682b4;
            border-color: #fff;
        }
        #panel::-webkit-scrollbar { width: 6px; }
        #panel::-webkit-scrollbar-track { background: transparent; }
        #panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="panel">
        <div id="panel-title">Обстановка штатная</div>
        <div id="panel-status">
            <div style="color:#228b22; font-size:14px;">🟢 Отбой угроз. Все спокойно.</div>
        </div>
    </div>
    
    <div id="map-container"></div>
    
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">-</button>
    </div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#map-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        const projection = d3.geoConicEqualArea()
            .rotate([-100, 0])
            .center([0, 65])
            .scale(Math.min(width, height) * 1.2)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const zoom = d3.zoom()
            .scaleExtent([0.5, 10])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        d3.select("#zoom-in").on("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.5);
        });

        d3.select("#zoom-out").on("click", () => {
            svg.transition().duration(300).call(zoom.scaleBy, 0.75);
        });

        let currentAlerts = {};
        let mapDataLoaded = false;

        // Загрузка локального файла с картой
        d3.json("russia.geojson")
            .then(data => {
                g.selectAll("path")
                    .data(data.features)
                    .enter()
                    .append("path")
                    .attr("class", "region")
                    .attr("d", path)
                    // Умный парсинг имени: проверяем и name:ru (для OSM), и name
                    .attr("data-name", d => d.properties["name:ru"] || d.properties.name);

                mapDataLoaded = true;
                fetchAlertData();
                setInterval(fetchAlertData, 10000);
            })
            .catch(err => {
                document.getElementById("panel-status").innerHTML = `<div style="color:#ff0000;">Ошибка загрузки геоданных. Убедитесь, что файл russia.geojson лежит в репозитории.</div>`;
                console.error(err);
            });

        function updateMapColors() {
            if (!mapDataLoaded) return;
            
            g.selectAll(".region").style("fill", function(d) {
                const rawName = d.properties["name:ru"] || d.properties.name || "";
                const regionName = rawName.toLowerCase();
                let regionColor = "#2a2d37";
                
                for (const [place, info] of Object.entries(currentAlerts)) {
                    if (regionName.includes(place.toLowerCase())) {
                        regionColor = info.color;
                        break;
                    }
                }
                return regionColor;
            });
        }

        async function fetchAlertData() {
            try {
                const response = await fetch(`alert.json?t=${Date.now()}`);
                if (!response.ok) return;
                
                const data = await response.json();
                
                if (JSON.stringify(currentAlerts) !== JSON.stringify(data)) {
                    currentAlerts = data;
                    
                    const activePlaces = Object.keys(currentAlerts);
                    const panelTitle = document.getElementById("panel-title");
                    const panelStatus = document.getElementById("panel-status");
                    
                    if (activePlaces.length > 0) {
                        panelTitle.innerText = `Активные угрозы: ${activePlaces.length}`;
                        panelTitle.style.color = "#ff4444";
                        
                        let alertsHtml = "";
                        for (const [place, info] of Object.entries(currentAlerts)) {
                            alertsHtml += `
                                <div class="alert-item" style="border-left: 3px solid ${info.color}">
                                    <div class="alert-place" style="color: ${info.color}">${place}</div>
                                    <div style="color: #ccc">${info.status}</div>
                                </div>
                            `;
                        }
                        panelStatus.innerHTML = alertsHtml;
                    } else {
                        panelTitle.innerText = "Обстановка штатная";
                        panelTitle.style.color = "#ffffff";
                        panelStatus.innerHTML = `<div style="color:#228b22; font-size:14px;">🟢 Отбой угроз. Все спокойно.</div>`;
                    }
                    
                    updateMapColors();
                }
            } catch (error) {
                console.error("Ошибка чтения alert.json:", error);
            }
        }
        
        window.addEventListener('resize', () => {
            svg.attr("width", window.innerWidth).attr("height", window.innerHeight);
        });
    </script>
</body>
</html>
