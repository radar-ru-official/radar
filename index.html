<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система мониторинга безопасности</title>
    <style>
        :root {
            --bg-color: #0a0e14;
            --panel-bg: rgba(15, 20, 30, 0.9);
            --gold: #d4af37;
            --color-bpla: #ffeb3b; /* Желтый */
            --color-alert: #ff0000; /* Красный */
            --color-missile: #8b0000; /* Темно-красный */
            --color-avia: #8b4513; /* Коричневый */
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Неоновая полоса флага */
        .neon-flag {
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, #fff 33%, #0039a6 33%, #0039a6 66%, #d52b1e 66%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 10px rgba(0, 57, 166, 0.5), 0 0 10px rgba(213, 43, 30, 0.5);
        }

        .dashboard {
            display: flex;
            height: calc(100vh - 4px);
        }

        #map-container {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg { max-width: 90%; max-height: 90%; }
        
        /* Стили состояний для регионов */
        .status-bpla { fill: var(--color-bpla) !important; }
        .status-alert { fill: var(--color-alert) !important; }
        .status-missile { fill: var(--color-missile) !important; }
        .status-avia { fill: var(--color-avia) !important; }

        /* Панель */
        .control-panel {
            width: 350px;
            background: var(--panel-bg);
            border-left: 1px solid var(--gold);
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .region-card {
            border: 1px solid var(--gold);
            padding: 15px;
            margin-bottom: 10px;
        }

        .last-update {
            font-size: 0.8em;
            color: var(--gold);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="neon-flag"></div>
<div class="dashboard">
    <div id="map-container">
        <!-- СЮДА ВСТАВЬТЕ ВАШ SVG (убедитесь что у путей есть ID) -->
        <svg viewBox="0 0 1000 600">
            <!-- Пример региона -->
            <path id="RU-ZAB" d="..." fill="#2c3e50" stroke="#fff" />
        </svg>
    </div>

    <div class="control-panel">
        <h1>Статус регионов</h1>
        <div id="info-board">
            <p>Выберите регион на карте для получения данных.</p>
        </div>
        <div class="last-update" id="update-time">Ожидание данных...</div>
    </div>
</div>

<script>
    // Маппинг цветов к типам опасности
    const threatConfig = {
        'BPLA': { class: 'status-bpla', label: 'Беспилотная опасность' },
        'ALERT': { class: 'status-alert', label: 'Тревога / Работа ПВО' },
        'MISSILE': { class: 'status-missile', label: 'Ракетная опасность' },
        'AVIA': { class: 'status-avia', label: 'Авиационная опасность' }
    };

    function updateRegion(regionId, type) {
        const path = document.getElementById(regionId);
        if (!path) return;

        // Сброс классов
        path.className.baseVal = ''; 
        
        // Применение нового состояния
        if (type && threatConfig[type]) {
            path.classList.add(threatConfig[type].class);
            updatePanel(regionId, threatConfig[type].label);
        } else {
            path.style.fill = "#2c3e50"; // Стандартный цвет
        }
        
        document.getElementById('update-time').innerText = 'Последнее обновление: ' + new Date().toLocaleTimeString();
    }

    function updatePanel(regionId, statusText) {
        const panel = document.getElementById('info-board');
        panel.innerHTML = `
            <div class="region-card">
                <h3>Регион: ${regionId}</h3>
                <p>Статус: <strong>${statusText}</strong></p>
            </div>
        `;
    }

    // Эмуляция получения данных с сервера (здесь будет ваш fetch)
    function mockUpdate() {
        // Пример: Обновляем Забайкальский край
        updateRegion('RU-ZAB', 'BPLA');
    }

    setInterval(mockUpdate, 5000); // Проверка обновлений каждые 5 сек
</script>
</body>
</html>
