<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта Радар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([55.0, 45.0], 5);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Спутник'
    }).addTo(map);

    var coords = {
        "Москва": [55.7558, 37.6173], "Санкт-Петербург": [59.9343, 30.3351],
        "Новосибирск": [55.0084, 82.9357], "Екатеринбург": [56.8389, 60.6057],
        "Казань": [55.7961, 49.1064], "Нижний Новгород": [56.3261, 44.0058],
        "Красноярск": [56.0153, 92.8932], "Челябинск": [55.1549, 61.4291],
        "Самара": [53.2001, 50.1500], "Уфа": [54.7431, 55.9678],
        "Ростов-на-Дону": [47.2357, 39.7015], "Омск": [54.9885, 73.3245],
        "Краснодар": [45.0355, 38.9753], "Воронеж": [51.6608, 39.2003],
        "Пермь": [58.0097, 56.2294], "Волгоград": [48.7080, 44.5133],
        "Ярославль": [57.6261, 39.8845], "Рязань": [54.6095, 39.7126],
        "Липецк": [52.6031, 39.5708], "Тула": [54.1961, 37.6182],
        "Калининград": [54.7104, 20.4522], "Саратов": [51.5434, 46.0084],
        "Тольятти": [53.5078, 49.4177], "Ижевск": [56.8526, 53.2069],
        "Ульяновск": [54.3142, 48.4031], "Оренбург": [51.7666, 55.0988],
        "Пенза": [53.2273, 44.9983], "Набережные Челны": [55.7423, 52.4231],
        "Астрахань": [46.3476, 48.0302], "Махачкала": [42.9831, 47.5046],
        "Тюмень": [57.1523, 65.5273], "Барнаул": [53.3548, 83.7698],
        "Иркутск": [52.2870, 104.3050], "Хабаровск": [48.4726, 135.0577],
        "Владивосток": [43.1198, 131.8869], "Томск": [56.4977, 84.9744],
        "Кемерово": [55.3450, 86.0640], "Новокузнецк": [53.7557, 87.1099]
    };

    var markers = {};
    function loadAlerts() {
        fetch('alert.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                for (let m in markers) { map.removeLayer(markers[m]); }
                for (let place in data) {
                    let info = data[place];
                    let latLng = coords[place];
                    if (latLng) {
                        markers[place] = L.marker(latLng).addTo(map)
                            .bindPopup(`<b>${place}</b><br>${info.status}`);
                    }
                }
            });
    }

    setInterval(loadAlerts, 5000);
    loadAlerts();
</script>
</body>
</html>
