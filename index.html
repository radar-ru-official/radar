<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфо-Табло Опасностей</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#0a0c10; font-family:sans-serif; color:#fff; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .monitor-box { text-align:center; padding:40px; border-radius:12px; background:#11141a; border:2px solid #222733; max-width:90%; width:500px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .system-title { font-size:12px; letter-spacing:2px; color:#52607a; text-transform:uppercase; margin-bottom:30px; font-weight:bold; }
        #place { font-size:38px; font-weight:bold; margin-bottom:15px; color:#e1e7f0; }
        #status { font-size:22px; font-weight:bold; padding:15px; border-radius:6px; background:#1c212c; border:1px solid #2d3547; display:inline-block; margin-top:10px; }
        .footer-info { margin-top:40px; font-size:11px; color:#414b5e; }
    </style>
</head>
<body>

    <div class="monitor-box">
        <div class="system-title">🚨 СИСТЕМА МОНИТОРИНГА РАДАР</div>
        <div id="place">Загрузка данных...</div>
        <div id="status" style="color:#a0a5b5;">Ожидание постов из ТГ</div>
        <div class="footer-info">Данные обновляются автоматически каждые 15 секунд</div>
    </div>

    <script>
        async function loadData() {
            try {
                let r = await fetch('alert.json?t=' + Date.now());
                let j = await r.json();
                if (j && j.active) {
                    document.getElementById('place').innerText = j.place;
                    document.getElementById('status').innerText = j.status;
                    document.getElementById('status').style.color = j.color;
                    document.getElementById('status').style.borderColor = j.color;
                } else {
                    document.getElementById('place').innerText = "РФ (Все регионы)";
                    document.getElementById('status').innerText = "🟢 Обстановка спокойная";
                    document.getElementById('status').style.color = "#22252c";
                }
            } catch(e) {
                // Если файла еще нет, показываем дефолтный статус
                document.getElementById('place').innerText = "РФ (Все регионы)";
                document.getElementById('status').innerText = "🟢 Обстановка спокойная";
                document.getElementById('status').style.color = "#52607a";
            }
        }

        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
