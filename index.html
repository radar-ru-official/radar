<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЕРАТИВНЫЙ РАДАР</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #090c10; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .neon-flag { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #fff 33%, #0039a6 33% 66%, #d52b1e 66%); z-index: 9999; box-shadow: 0 0 15px rgba(255,255,255,0.2), 0 0 20px rgba(0, 57, 166, 0.4), 0 0 20px rgba(213, 43, 30, 0.4); }
        #map { flex: 1; background: #090c10; }
        #sidebar { width: 380px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .header { padding: 20px; border-bottom: 1px solid #30363d; background: #0d1117; }
        .title { font-size: 18px; font-weight: bold; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .live-badge { font-size: 11px; background: rgba(229, 46, 46, 0.1); color: #e52e2e; padding: 3px 8px; border-radius: 12px; border: 1px solid rgba(229, 46, 46, 0.3); animation: pulse 2s infinite; }
        .update-time { font-size: 12px; color: #8b949e; margin-top: 5px; }
        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .feed-item { background: #21262d; border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid; }
        .region-name { font-weight: bold; color: #fff; font-size: 15px; margin-bottom: 4px; }
        .threat-type { font-size: 13px; font-weight: bold; }
        
        /* Стили для всплывающих названий регионов */
        .leaflet-tooltip { background: #161b22; border: 1px solid #30363d; color: #fff; box-shadow: 0 3px 14px rgba(0,0,0,0.4); border-radius: 4px; font-weight: bold; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(229,46,46,0.4); } 70% { box-shadow: 0 0 0 4px rgba(229,46,46,0); } 100% { box-shadow: 0 0 0 0 rgba(229,46,46,0); } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d1117; } ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    </style>
</head>
<body>

<div class="neon-flag"></div>
<div id="map"></div>
<div id="sidebar">
    <div class="header">
        <div class="title">ОПЕРАТИВНАЯ СВОДКА <span class="live-badge">● LIVE</span></div>
        <div class="update-time" id="last-update">Подключение к спутнику...</div>
    </div>
    <div id="feed"></div>
</div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([62, 90], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const THREAT_DATA = {
        'BPLA': { color: '#ffc107', label: 'Опасность БПЛА' },
        'ALERT': { color: '#e52e2e', label: 'Угроза атаки / Тревога' },
        'MISSILE': { color: '#8b0000', label: 'Ракетная опасность' },
        'AVIA': { color: '#8b4513', label: 'Авиационная / УАБ опасность' },
        'OFF': { color: '#21262d', label: 'Отбой' }
    };

    // Умный поиск: ищет совпадения и на русском, и на английском
    const REGIONS_DICT = {
        'RU-MOS': { name: 'Москва и МО', keys: ['москв', 'moscow', 'moskov'] },
        'RU-PEN': { name: 'Пензенская область', keys: ['пензен', 'penza'] },
        'RU-KAL': { name: 'Калужская область', keys: ['калуж', 'kalug', 'kaluzh'] },
        'RU-LEN': { name: 'Ленинградская область', keys: ['ленинград', 'leningrad'] },
        'RU-PSO': { name: 'Псковская область', keys: ['псков', 'pskov'] },
        'RU-SMO': { name: 'Смоленская область', keys: ['смолен', 'smolensk'] },
        'RU-TVE': { name: 'Тверская область', keys: ['твер', 'tver'] },
        'RU-BRY': { name: 'Брянская область', keys: ['брянск', 'bryansk'] },
        'RU-ORL': { name: 'Орловская область', keys: ['орлов', 'орел', 'orel', 'oryol', 'orlov'] },
        'RU-KUR': { name: 'Курская область', keys: ['курск', 'kursk'] },
        'RU-BEL': { name: 'Белгородская область', keys: ['белгород', 'belgorod'] },
        'RU-VOR': { name: 'Воронежская область', keys: ['воронеж', 'voronezh'] },
        'RU-TAM': { name: 'Тамбовская область', keys: ['тамбов', 'tambov'] },
        'RU-SAR': { name: 'Саратовская область', keys: ['саратов', 'saratov'] },
        'RU-KRA': { name: 'Краснодарский край', keys: ['краснодар', 'krasnodar'] },
        'RU-ROS': { name: 'Ростовская область', keys: ['ростов', 'rostov'] },
        'RU-VOL': { name: 'Волгоградская область', keys: ['волгоград', 'volgograd'] },
        'RU-AST': { name: 'Астраханская область', keys: ['астрахан', 'astrakhan'] },
        'RU-NIZ': { name: 'Нижегородская область', keys: ['нижегород', 'nizhny'] },
        'RU-SAM': { name: 'Самарская область', keys: ['самар', 'samar'] },
        'RU-TAT': { name: 'Республика Татарстан', keys: ['татарстан', 'tatarstan'] },
        'RU-KRM': { name: 'Крым', keys: ['крым', 'crimea'] },
        'RU-SEV': { name: 'Севастополь', keys: ['севастополь', 'sevastopol'] }
    };

    let geoJsonLayer = null;
    let currentAlerts = null;
    const statusText = document.getElementById('last-update');

    // Функция загрузки геометрии (пробуем два формата имени)
    async function initMap() {
        let geoData = null;
        try {
            let res = await fetch('russia.json');
            if (!res.ok) throw new Error('not json');
            geoData = await res.json();
        } catch (e1) {
            try {
                let res2 = await fetch('russia.geojson');
                if (!res2.ok) throw new Error('not geojson');
                geoData = await res2.json();
            } catch (e2) {
                statusText.innerText = '❌ Ошибка: Файл карты (russia.json или russia.geojson) не найден!';
                statusText.style.color = '#e52e2e';
                return;
            }
        }

        // Рисуем карту с всплывающими названиями
        geoJsonLayer = L.geoJSON(geoData, {
            style: { fillColor: '#21262d', weight: 1, color: '#30363d', fillOpacity: 0.8 },
            onEachFeature: function(feature, layer) {
                // Достаем название как оно есть в файле
                const rawName = feature.properties.name || feature.properties.NAME || "Неизвестный регион";
                // Добавляем подсказку
                layer.bindTooltip(rawName, { direction: 'center', className: 'leaflet-tooltip' });
            }
        }).addTo(map);
        
        statusText.innerText = 'Карта загружена. Ожидание данных...';
        pollAlerts();
    }

    // Цикл получения угроз
    async function pollAlerts() {
        try {
            const res = await fetch('alert.json?t=' + Date.now());
            if (!res.ok) throw new Error('Alert json not found');
            const newAlerts = await res.json();
            
            if (JSON.stringify(newAlerts) !== JSON.stringify(currentAlerts)) {
                currentAlerts = newAlerts;
                statusText.innerText = 'Активность обновлена: ' + new Date().toLocaleTimeString();
                updateMapAndFeed(newAlerts);
            }
        } catch(e) {
            if(!currentAlerts) statusText.innerText = '⚠️ Жду файл alert.json...';
        }
        setTimeout(pollAlerts, 2000);
    }

    // Покраска
    function updateMapAndFeed(alerts) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        let activeCount = 0;

        geoJsonLayer.eachLayer(layer => {
            const props = layer.feature.properties;
            const geoName = (props.name || props.NAME || "").toLowerCase();
            
            let threat = 'OFF';
            let regCode = null;

            // Ищем совпадение
            for (let code in alerts) {
                if(REGIONS_DICT[code]) {
                    // Проверяем все ключевые слова для этого региона
                    let isMatch = REGIONS_DICT[code].keys.some(key => geoName.includes(key));
                    if (isMatch) {
                        threat = alerts[code];
                        regCode = code;
                        break;
                    }
                }
            }

            const tData = THREAT_DATA[threat] || THREAT_DATA['OFF'];
            layer.setStyle({ fillColor: tData.color, fillOpacity: threat !== 'OFF' ? 0.6 : 0.8 });

            if (threat !== 'OFF' && regCode) {
                activeCount++;
                feed.innerHTML += `
                    <div class="feed-item" style="border-left-color: ${tData.color};">
                        <div class="region-name">${REGIONS_DICT[regCode].name}</div>
                        <div class="threat-type" style="color: ${tData.color};">${tData.label}</div>
                    </div>
                `;
            }
        });

        if (activeCount === 0) {
            feed.innerHTML = '<div style="color:#8b949e; text-align:center; padding-top:20px;">На данный момент угрозы отсутствуют.</div>';
        }
    }

    // Запуск
    initMap();
</script>
</body>
</html>
