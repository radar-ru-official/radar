<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар - Мониторинг БПЛА по РФ</title>
    <style>
        body {
            background-color: #121212; /* Темный фон для стиля радара */
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #ff4444;
            text-transform: uppercase;
        }
        #alerts-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .alert-card {
            background-color: #2a0000; /* Темно-красный фон */
            border-left: 5px solid #ff0000;
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .alert-region {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ff6666;
        }
        .alert-status {
            font-size: 1.1em;
            color: #dddddd;
        }
        .safe {
            background-color: #003300;
            border-left: 5px solid #00ff00;
            padding: 20px;
            border-radius: 5px;
            color: #00ff00;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Радар: Воздушная обстановка РФ</h1>
        <p>Автоматическое обновление данных...</p>
        
        <!-- СЮДА МОЖЕШЬ ВСТАВИТЬ СВОЮ SVG КАРТУ РОССИИ ЕСЛИ ОНА ЕСТЬ -->
        
        <div id="alerts-list">
            <p>Загрузка данных с серверов...</p>
        </div>
    </div>

    <script>
        async function loadAlerts() {
            try {
                // Загружаем alert.json. ?t= добавляем чтобы браузер не кэшировал старые данные
                const response = await fetch('alert.json?t=' + new Date().getTime());
                const data = await response.json();
                
                const list = document.getElementById('alerts-list');
                list.innerHTML = ''; // Очищаем экран перед загрузкой новых данных

                const regions = Object.keys(data);

                // Если alert.json пустой (нет угроз)
                if (regions.length === 0) {
                    list.innerHTML = '<div class="safe">✅ В данный момент угроз не зафиксировано. Небо чистое.</div>';
                    return;
                }

                // Если угрозы есть, выводим их
                for (let region in data) {
                    const status = data[region];
                    
                    const card = document.createElement('div');
                    card.className = 'alert-card';
                    card.innerHTML = `
                        <div class="alert-region">🚨 ${region}</div>
                        <div class="alert-status">${status}</div>
                    `;
                    list.appendChild(card);
                    
                    // ЕСЛИ У ТЕБЯ ЕСТЬ SVG КАРТА, СКРИПТ МОЖЕТ ЕЕ КРАСИТЬ ТУТ.
                    // Например, если у региона на карте id совпадает с названием:
                    // try { document.getElementById(region).style.fill = 'red'; } catch(e) {}
                }
            } catch (error) {
                console.error("Ошибка загрузки alert.json", error);
            }
        }

        // Запускаем сразу при входе
        loadAlerts();
        // Обновляем каждые 10 секунд автоматически
        setInterval(loadAlerts, 10000);
    </script>
</body>
</html>
