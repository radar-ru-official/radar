<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта мониторинга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0f14; font-family: sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .legend { position: fixed; bottom: 20px; left: 20px; background: rgba(15, 20, 26, 0.9); padding: 15px; border-radius: 8px; color: #fff; z-index: 1000; font-size: 12px; }
        .legend-item { display: flex; align-items: center; margin: 5px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .tooltip { position: fixed; background: #000; color: #fff; padding: 8px; border-radius: 4px; pointer-events: none; display: none; z-index: 2000; font-size: 12px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="legend" id="legend"></div>
<div id="tooltip" class="tooltip"></div>

<script>
    const map = L.map('map', { zoomControl: true }).setView([62.0, 90.0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const statusConfig = {
        BPLA: { color: '#ffc107', text: 'БПЛА' },
        ALERT: { color: '#e52e2e', text: 'ТРЕВОГА' },
        MISSILE: { color: '#8b0000', text: 'РАКЕТНАЯ' },
        AVIA: { color: '#8b4513', text: 'АВИАЦИЯ' },
        OFF: { color: '#2f353d', text: 'ТИХО' }
    };

    const regionKeywords = {
        'моск': 'RU-MOS', 'пенз': 'RU-PEN', 'калуж': 'RU-KAL', 'ленингр': 'RU-LEN', 
        'псков': 'RU-PSO', 'смолен': 'RU-SMO', 'твер': 'RU-TVE', 'брян': 'RU-BRY', 
        'орлов': 'RU-ORL', 'курск': 'RU-KUR', 'белгород': 'RU-BEL', 'воронеж': 'RU-VOR', 
        'тамбов': 'RU-TAM', 'саратов': 'RU-SAR', 'краснодар': 'RU-KRA', 'ростов': 'RU-ROS', 
        'волгоград': 'RU-VOL', 'астрах': 'RU-AST', 'нижегор': 'RU-NIZ', 'самар': 'RU-SAM', 
        'татарстан': 'RU-TAT', 'башкорт': 'RU-BAS', 'свердл': 'RU-SVE', 'челяб': 'RU-CHE', 
        'омск': 'RU-OMS', 'новосиб': 'RU-NVS', 'томск': 'RU-TOM', 'краснояр': 'RU-KYA', 
        'иркут': 'RU-IRK', 'бурят': 'RU-BUR', 'забайкал': 'RU-ZAB', 'якут': 'RU-YAK', 
        'хабар': 'RU-KHA', 'амур': 'RU-AMU', 'примор': 'RU-PRM', 'магадан': 'RU-MAG', 
        'камчат': 'RU-KAM', 'сахалин': 'RU-SAK', 'чукот': 'RU-CHU', 'крым': 'RU-KRM', 
        'севастополь': 'RU-SEV', 'донец': 'RU-DNR', 'луган': 'RU-LNR', 'запорож': 'RU-ZAP', 'херсон': 'RU-HER'
    };

    let currentAlerts = {};
    let geoJsonLayer;

    function getCode(name) {
        if(!name) return null;
        let n = name.toLowerCase();
        for(let key in regionKeywords) if(n.includes(key)) return regionKeywords[key];
        return null;
    }

    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
    .then(r => r.json()).then(data => {
        geoJsonLayer = L.geoJSON(data, {
            style: f => {
                let code = getCode(f.properties.name);
                let status = currentAlerts[code] || 'OFF';
                return { fillColor: statusConfig[status].color, weight: 1, fillOpacity: 0.6, color: '#fff' };
            },
            onEachFeature: (f, l) => {
                l.on('mouseover', e => {
                    document.getElementById('tooltip').style.display = 'block';
                    document.getElementById('tooltip').innerText = f.properties.name;
                });
                l.on('mousemove', e => {
                    document.getElementById('tooltip').style.left = (e.originalEvent.clientX + 10) + 'px';
                    document.getElementById('tooltip').style.top = (e.originalEvent.clientY + 10) + 'px';
                });
                l.on('mouseout', () => document.getElementById('tooltip').style.display = 'none');
            }
        }).addTo(map);
        update();
    });

    async function update() {
        try {
            let res = await fetch('alert.json?t=' + Date.now());
            currentAlerts = await res.json();
            geoJsonLayer.eachLayer(l => l.setStyle({ fillColor: statusConfig[currentAlerts[getCode(l.feature.properties.name)] || 'OFF'].color }));
        } catch(e) {}
        setTimeout(update, 5000);
    }
</script>
</body>
</html>
