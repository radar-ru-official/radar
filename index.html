<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАДАР МОНИТОРИНГ РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a0a0b; --panel: rgba(15, 15, 18, 0.95); --accent: #0056b3; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: contrast(1.05) brightness(0.95); }
        
        .dashboard { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 350px; height: 90vh; display: flex; flex-direction: column; background: var(--panel); border-left: 4px solid var(--accent); box-shadow: 10px 0 30px rgba(0,0,0,0.5); padding: 20px; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .status-bar { font-size: 11px; color: #888; margin-top: 5px; display: flex; justify-content: space-between; }
        
        #alerts-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        #alerts-container::-webkit-scrollbar { width: 4px; }
        #alerts-container::-webkit-scrollbar-thumb { background: #333; }

        .alert-card { background: #16161a; padding: 12px; margin-bottom: 10px; border-left: 4px solid #444; border-radius: 2px; }
        .alert-card.uab { border-color: #ff0000; background: #2a1010; }
        .alert-card.rocket { border-color: #b30000; }
        .alert-card.alarm { border-color: #e67e22; }
        .alert-card.bpla { border-color: #f1c40f; }

        .reg-name { font-weight: 600; font-size: 14px; display: block; }
        .status-text { font-size: 12px; color: #ccc; margin-top: 4px; }
        .live-dot { height: 8px; width: 8px; background: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="title">СИСТЕМА ГРАЖДАНСКОЙ ОБОРОНЫ</div>
        <div class="status-bar">
            <span><span class="live-dot"></span> LIVE FEED</span>
            <span id="last-sync">Обновление...</span>
        </div>
    </div>
    <div id="alerts-container">
        <div class="alert-card">Загрузка данных мониторинга...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([50.0, 36.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function update() {
        fetch('alert.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('alerts-container');
            const sync = document.getElementById('last-sync');
            let html = '';
            let keys = Object.keys(data);
            
            if (keys.length === 0) {
                html = '<div class="alert-card">Все зоны под контролем.</div>';
            } else {
                keys.forEach(k => {
                    let s = data[k].status.toLowerCase();
                    let cls = s.includes('уаб') ? 'uab' : 
                              s.includes('ракетная') ? 'rocket' : 
                              s.includes('тревога') ? 'alarm' : 'bpla';
                    html += `
                        <div class="alert-card ${cls}">
                            <span class="reg-name">${k}</span>
                            <span class="status-text">${data[k].status}</span>
                        </div>`;
                });
            }
            container.innerHTML = html;
            sync.innerText = 'Обновлено: ' + new Date().toLocaleTimeString();
        });
    }

    setInterval(update, 3000);
    update();
</script>
</body>
</html>
