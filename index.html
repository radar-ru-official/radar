<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАДАР РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: grayscale(0.2) contrast(1.1); }

        /* UI панель */
        .ui-panel { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 340px; background: rgba(10, 10, 12, 0.95); border: 1px solid #222; }
        .tricolor-bar { height: 4px; width: 100%; background: linear-gradient(90deg, #fff 33.3%, #0039a6 33.3% 66.6%, #d52b1e 66.6%); }
        .panel-content { padding: 15px; }
        .branding { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        
        .threat-header { font-size: 13px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .feed-container { max-height: 65vh; overflow-y: auto; }
        
        /* Цвета угрозы */
        .threat-card { background: #151515; padding: 10px; margin-bottom: 8px; border-left: 3px solid #555; }
        .rocket { border-color: #8B0000; } /* Темно-красный */
        .alarm { border-color: #FF5E5E; }  /* Светло-красный */
        .bpla { border-color: #FFD700; }   /* Желтый */
        
        .card-title { font-weight: 600; font-size: 13px; display: block; }
        .card-desc { font-size: 12px; color: #aaa; margin-top: 2px; }
        
        .flag-box { position: fixed; bottom: 20px; right: 20px; z-index: 2000; font-size: 35px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="tricolor-bar"></div>
    <div class="panel-content">
        <div class="branding">РАДАР РФ</div>
        <div class="threat-header">АКТУАЛЬНЫЕ УГРОЗЫ</div>
        <div class="feed-container" id="log">
            <div style="font-size: 12px; color: #555;">Загрузка данных...</div>
        </div>
    </div>
</div>

<div class="flag-box">🇷🇺</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([60.0, 50.0], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    let geoData = null;

    // Цвета по легенде
    function getColor(status) {
        if (!status) return "#222"; 
        const s = status.toLowerCase();
        if (s.includes("ракетная")) return "#8B0000"; 
        if (s.includes("тревога")) return "#FF5E5E"; 
        if (s.includes("бпла")) return "#FFD700";
        return "#444";
    }

    // Загрузка границ
    fetch('regions.geojson').then(r => r.json()).then(data => { geoData = data; });

    // Обновление в реальном времени
    function refresh() {
        fetch('alert.json?t=' + Date.now())
            .then(r => r.json())
            .then(alerts => {
                if (window.layer) map.removeLayer(window.layer);
                if (geoData) {
                    window.layer = L.geoJSON(geoData, {
                        style: (feature) => {
                            const geoName = feature.properties.name.toLowerCase();
                            let status = null;
                            for (const key in alerts) {
                                if (geoName.includes(key.toLowerCase())) {
                                    status = alerts[key].status;
                                    break;
                                }
                            }
                            return { fillColor: getColor(status), color: "#000", weight: 0.8, fillOpacity: 0.8 };
                        }
                    }).addTo(map);
                }

                const log = document.getElementById('log');
                const keys = Object.keys(alerts);
                if (keys.length === 0) {
                    log.innerHTML = "<div style='font-size:12px; color:#444;'>Все штатно</div>";
                } else {
                    log.innerHTML = keys.map(k => {
                        const s = alerts[k].status.toLowerCase();
                        let cls = "";
                        if (s.includes("ракетная")) cls = "rocket";
                        else if (s.includes("тревога")) cls = "alarm";
                        else if (s.includes("бпла")) cls = "bpla";
                        return `<div class="threat-card ${cls}"><span class="card-title">${k}</span><span class="card-desc">${alerts[k].status}</span></div>`;
                    }).join('');
                }
            })
            .catch(e => console.log("Ожидание данных..."));
    }

    setInterval(refresh, 5000);
    refresh();
</script>
</body>
</html>
