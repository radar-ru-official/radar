<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЕРАТИВНЫЙ РАДАР</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #090c10; color: #c9d1d9; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .neon-flag { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #fff 33%, #0039a6 33% 66%, #d52b1e 66%); z-index: 9999; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #map { flex: 1; background: #090c10; }
        #sidebar { width: 380px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; z-index: 1000; }
        .header { padding: 20px; border-bottom: 1px solid #30363d; background: #0d1117; }
        .title { font-size: 18px; font-weight: bold; color: #fff; display: flex; justify-content: space-between; }
        .live-badge { font-size: 11px; background: rgba(229, 46, 46, 0.1); color: #e52e2e; padding: 3px 8px; border-radius: 12px; border: 1px solid #e52e2e; }
        .update-time { font-size: 12px; color: #8b949e; margin-top: 5px; }
        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .feed-item { background: #21262d; border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid; }
        .region-name { font-weight: bold; color: #fff; font-size: 15px; margin-bottom: 5px; }
        .threat-type { font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div class="neon-flag"></div>
<div id="map"></div>
<div id="sidebar">
    <div class="header">
        <div class="title">ОПЕРАТИВНАЯ СВОДКА <span class="live-badge">● LIVE</span></div>
        <div class="update-time" id="last-update">Ожидание данных...</div>
    </div>
    <div id="feed"></div>
</div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([62, 90], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    const THREAT_DATA = {
        'BPLA': { color: '#ffc107', label: 'Опасность БПЛА' },
        'ALERT': { color: '#e52e2e', label: 'Угроза атаки / Тревога' },
        'MISSILE': { color: '#8b0000', label: 'Ракетная опасность' },
        'AVIA': { color: '#8b4513', label: 'Авиационная / УАБ опасность' },
        'OFF': { color: '#21262d', label: 'Отбой' }
    };

    const REGIONS = {
        'RU-MOS': 'Москва и МО', 'RU-PEN': 'Пензенская область', 'RU-KAL': 'Калужская область',
        'RU-LEN': 'Ленинградская область', 'RU-PSO': 'Псковская область', 'RU-SMO': 'Смоленская область',
        'RU-TVE': 'Тверская область', 'RU-BRY': 'Брянская область', 'RU-ORL': 'Орловская область',
        'RU-KUR': 'Курская область', 'RU-BEL': 'Белгородская область', 'RU-VOR': 'Воронежская область',
        'RU-TAM': 'Тамбовская область', 'RU-SAR': 'Саратовская область', 'RU-KRA': 'Краснодарский',
        'RU-ROS': 'Ростовская область', 'RU-VOL': 'Волгоградская область', 'RU-AST': 'Астраханская область',
        'RU-NIZ': 'Нижегородская область', 'RU-SAM': 'Самарская область', 'RU-TAT': 'Татарстан',
        'RU-KRM': 'Крым', 'RU-SEV': 'Севастополь'
    };

    let geoJsonLayer;
    let currentAlerts = null;

    // Загрузка карты
    fetch('russia.json')
        .then(r => r.json())
        .then(data => {
            geoJsonLayer = L.geoJSON(data, {
                style: { fillColor: '#21262d', weight: 1, color: '#30363d', fillOpacity: 0.8 }
            }).addTo(map);
            pollAlerts();
        });

    // Опрос файла alert.json
    async function pollAlerts() {
        try {
            const res = await fetch('alert.json?t=' + Date.now());
            const newAlerts = await res.json();
            
            if (JSON.stringify(newAlerts) !== JSON.stringify(currentAlerts)) {
                currentAlerts = newAlerts;
                document.getElementById('last-update').innerText = 'Активность обновлена: ' + new Date().toLocaleTimeString();
                updateMapAndFeed(newAlerts);
            }
        } catch(e) {}
        setTimeout(pollAlerts, 2000);
    }

    // Отрисовка
    function updateMapAndFeed(alerts) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        let count = 0;

        geoJsonLayer.eachLayer(layer => {
            const props = layer.feature.properties;
            const regionGeoName = (props.name || props.NAME || props.NL_NAME_1 || "").toLowerCase();
            
            let currentThreat = 'OFF';
            let currentCode = null;

            for (let code in alerts) {
                // Упрощенный и надежный поиск региона по корню слова (например, "пензен")
                let searchWord = (REGIONS[code] || "").toLowerCase().split(' ')[0].replace('ская', '').replace('ский', '');
                
                if (searchWord.length > 2 && regionGeoName.includes(searchWord)) {
                    currentThreat = alerts[code];
                    currentCode = code;
                    break;
                }
            }

            const tData = THREAT_DATA[currentThreat] || THREAT_DATA['OFF'];
            layer.setStyle({ fillColor: tData.color, fillOpacity: currentThreat !== 'OFF' ? 0.6 : 0.8 });

            if (currentThreat !== 'OFF' && currentCode) {
                count++;
                feed.innerHTML += `
                    <div class="feed-item" style="border-left-color: ${tData.color};">
                        <div class="region-name">${REGIONS[currentCode]}</div>
                        <div class="threat-type" style="color: ${tData.color};">${tData.label}</div>
                    </div>
                `;
            }
        });

        if (count === 0) {
            feed.innerHTML = '<div style="color:#8b949e; text-align:center; padding-top:20px;">Угрозы отсутствуют.</div>';
        }
    }
</script>
</body>
</html>
