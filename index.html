<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>РАДАР РФ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: grayscale(0.2) contrast(1.1); }
        .ui-panel { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 340px; background: rgba(10, 10, 12, 0.95); border: 1px solid #222; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tricolor-bar { height: 4px; width: 100%; background: linear-gradient(90deg, #fff 33.3%, #0039a6 33.3% 66.6%, #d52b1e 66.6%); border-radius: 4px 4px 0 0; }
        .panel-content { padding: 15px; }
        .branding { font-size: 20px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .stop-btn { background: #500; color: #ff9999; border: 1px solid #800; padding: 5px 10px; border-radius: 3px; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        .stop-btn:hover { background: #800; }
        .threat-header { font-size: 13px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .feed-container { max-height: 65vh; overflow-y: auto; }
        .threat-card { background: #151515; padding: 10px; margin-bottom: 8px; border-left: 3px solid #555; position: relative; }
        .rocket { border-color: #8B0000; } .alarm { border-color: #FF5E5E; } .bpla { border-color: #FFD700; }
        .card-title { font-weight: 600; font-size: 13px; display: block; }
        .card-desc { font-size: 12px; color: #aaa; margin-top: 2px; }
        .flag-box { position: fixed; bottom: 20px; right: 20px; z-index: 2000; font-size: 35px; opacity: 0.8; }
    </style>
</head>
<body>
<div class="ui-panel">
    <div class="tricolor-bar"></div>
    <div class="panel-content">
        <div class="branding">РАДАР РФ <button class="stop-btn">СТОП</button></div>
        <div class="threat-header">АКТУАЛЬНЫЕ УГРОЗЫ</div>
        <div class="feed-container" id="log">Загрузка...</div>
    </div>
</div>
<div class="flag-box">🇷🇺</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([60.0, 50.0], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 10 }).addTo(map);
    let geoData = null;

    fetch('russia.geojson').then(r => r.json()).then(data => { geoData = data; }).catch(e => console.error(e));

    function refresh() {
        if (!geoData) return;
        fetch('alert.json?t=' + Date.now()).then(r => r.json()).then(alerts => {
            if (window.layer) map.removeLayer(window.layer);
            
            window.layer = L.geoJSON(geoData, {
                style: (f) => {
                    const name = f.properties.name.toLowerCase().trim();
                    let status = null;
                    for (const key in alerts) {
                        const alertKey = key.toLowerCase().trim();
                        if (name.includes(alertKey) || alertKey.includes(name)) { 
                            status = alerts[key].status; 
                            break; 
                        }
                    }
                    
                    let color = "#1a1a1d";
                    if (status) {
                        const s = status.toLowerCase();
                        if (s.includes("ракетная")) color = "#8B0000";
                        else if (s.includes("тревога")) color = "#FF5E5E";
                        else if (s.includes("бпла")) color = "#FFD700";
                    }
                    return { fillColor: color, color: "#2a2a2d", weight: 1, fillOpacity: 0.85 };
                }
            }).addTo(map);

            const keys = Object.keys(alerts).sort((a,b) => (alerts[b].status.includes("ракетная") ? 1 : -1));
            document.getElementById('log').innerHTML = keys.length === 0 ? "Все штатно" : keys.map(k => {
                const s = alerts[k].status.toLowerCase();
                let cls = s.includes("ракетная") ? "rocket" : (s.includes("тревога") ? "alarm" : "bpla");
                return `<div class="threat-card ${cls}"><span class="card-title">${k}</span><span class="card-desc">${alerts[k].status}</span></div>`;
            }).join('');
        });
    }
    
    let checkGeo = setInterval(() => {
        if (geoData) { 
            refresh(); 
            clearInterval(checkGeo); 
            setInterval(refresh, 5000); 
        }
    }, 100);
</script>
</body>
</html>
