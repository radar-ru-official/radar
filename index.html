<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радар - Интерактивная карта</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1c23; color: #ffffff; font-family: sans-serif; overflow: hidden; }
        #map-container { width: 100vw; height: 100vh; }
        .region { fill: #2a2d37; stroke: #1a1c23; stroke-width: 0.5px; transition: fill 0.3s; cursor: pointer; }
        .region:hover { fill: #4682b4; }
        #panel { position: absolute; top: 20px; left: 20px; background: rgba(34, 37, 44, 0.9); padding: 15px; border-radius: 8px; z-index: 10; width: 300px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="panel">
        <div id="panel-title" style="font-weight:bold; margin-bottom:10px;">Обстановка штатная</div>
        <div id="panel-status">🟢 Все спокойно.</div>
    </div>
    <div id="map-container"></div>

    <script>
        const width = window.innerWidth, height = window.innerHeight;
        const svg = d3.select("#map-container").append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g");

        const projection = d3.geoMercator().center([100, 65]).scale(600).translate([width / 2, height / 2]);
        const path = d3.geoPath().projection(projection);

        let currentAlerts = {};

        d3.json("russia.geojson").then(data => {
            g.selectAll("path").data(data.features).enter().append("path")
                .attr("class", "region")
                .attr("d", path)
                .attr("data-name", d => d.properties.name);
            fetchAlertData();
            setInterval(fetchAlertData, 10000);
        });

        async function fetchAlertData() {
            try {
                const response = await fetch('alert.json?t=' + Date.now());
                currentAlerts = await response.json();
                
                const panelStatus = document.getElementById("panel-status");
                const panelTitle = document.getElementById("panel-title");
                
                if (Object.keys(currentAlerts).length > 0) {
                    panelTitle.innerText = "Активные угрозы!";
                    panelTitle.style.color = "#ff4444";
                    panelStatus.innerHTML = Object.entries(currentAlerts).map(([place, info]) => 
                        `<div style="margin-bottom:5px;"><b>${place}</b>: ${info.status}</div>`).join('');
                } else {
                    panelTitle.innerText = "Обстановка штатная";
                    panelTitle.style.color = "#ffffff";
                    panelStatus.innerHTML = "🟢 Все спокойно.";
                }

                g.selectAll(".region").style("fill", function(d) {
                    const name = d.properties.name.toLowerCase();
                    for (const [place, info] of Object.entries(currentAlerts)) {
                        if (name.includes(place.toLowerCase()) || place.toLowerCase().includes(name)) return info.color;
                    }
                    return "#2a2d37";
                });
            } catch(e) { console.log("Ждем данные..."); }
        }
    </script>
</body>
</html>
