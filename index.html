<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LIVE MONITORING CENTER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: contrast(1.1) brightness(0.9); }
        
        .panel { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 340px; height: 90vh; background: rgba(10, 10, 12, 0.95); border-left: 4px solid #0056b3; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,1); }
        .header { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .time { font-size: 11px; color: #00ff00; font-family: monospace; }
        
        #alerts-container { overflow-y: auto; flex-grow: 1; }
        .card { background: #111; padding: 12px; margin-bottom: 10px; border-left: 4px solid #444; }
        
        /* Цвета угрозы */
        .uab { border-color: #ff0000; background: #2a0505; }
        .rocket { border-color: #b30000; background: #1a0505; }
        .pvo { border-color: #0088cc; background: #051a2a; }
        .bpla { border-color: #f1c40f; background: #2a2505; }
        .alarm { border-color: #e67e22; background: #2a1505; }
    </style>
</head>
<body>

<div class="panel">
    <div class="header">
        <div style="font-weight:bold;">СИТУАЦИОННЫЙ ЦЕНТР</div>
        <div class="time" id="update-time">ОБНОВЛЕНИЕ: --:--:--</div>
    </div>
    <div id="alerts-container">Загрузка...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([54.0, 37.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // СЮДА ДОБАВЛЯЙ КООРДИНАТЫ РЕГИОНОВ (без них карта будет пустой)
    const regions = { "type": "FeatureCollection", "features": [
        { "type": "Feature", "properties": { "name": "Московская" }, "geometry": { "type": "Polygon", "coordinates": [[[35.0, 54.5], [35.0, 56.5], [39.0, 56.5], [39.0, 54.5], [35.0, 54.5]]] } },
        { "type": "Feature", "properties": { "name": "Тульская" }, "geometry": { "type": "Polygon", "coordinates": [[[36.0, 53.0], [36.0, 54.5], [38.5, 54.5], [38.5, 53.0], [36.0, 53.0]]] } }
    ]};

    let geoLayer = L.geoJSON(regions, {
        style: { color: "#333", weight: 1, fillColor: "#222", fillOpacity: 0.5 },
        onEachFeature: (f, l) => l.bindPopup(f.properties.name)
    }).addTo(map);

    function update() {
        fetch('alert.json?t=' + Date.now()).then(r => r.json()).then(data => {
            document.getElementById('update-time').innerText = "ОБНОВЛЕНО: " + new Date().toLocaleTimeString();
            let html = '';

            geoLayer.eachLayer(layer => {
                let name = layer.feature.properties.name;
                let status = data[name] ? (typeof data[name] === 'object' ? data[name].status : data[name]) : null;
                
                if (status) {
                    let s = status.toLowerCase();
                    let cls = s.includes('уаб') ? 'uab' : s.includes('ракетная') ? 'rocket' : 
                              s.includes('фиксация') ? 'pvo' : s.includes('бпла') ? 'bpla' : 'alarm';
                    
                    layer.setStyle({ fillColor: cls === 'uab' ? '#ff0000' : cls === 'pvo' ? '#0088cc' : cls === 'bpla' ? '#f1c40f' : '#e67e22', fillOpacity: 0.7 });
                    html += `<div class="card ${cls}"><span style="font-weight:bold">${name}</span><br><span style="font-size:12px">${status}</span></div>`;
                } else {
                    layer.setStyle({ fillColor: "#222", fillOpacity: 0.5 });
                }
            });
            document.getElementById('alerts-container').innerHTML = html || '<div class="card">Все зоны под контролем.</div>';
        });
    }

    setInterval(update, 3000);
    update();
</script>
</body>
</html>
