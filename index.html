<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Radar Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0e0e0e; }
        #map { height: 100vh; width: 100%; }
        
        #panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
            color: #fff; padding: 20px; border-radius: 15px;
            width: 300px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h3 { margin: 0 0 15px 0; font-size: 18px; color: #ff4757; text-transform: uppercase; }
        .alert-item { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; font-size: 14px; }
        .alert-item b { display: block; color: #fff; font-size: 16px; }
        .source { font-size: 11px; color: #888; margin-top: 4px; font-style: italic; }
    </style>
</head>
<body>

<div id="panel">
    <h3>Карта угроз</h3>
    <div id="alerts">Список пуст</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([55.0, 45.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var coords = {
        "Москва": [55.7558, 37.6173], "Санкт-Петербург": [59.9343, 30.3351],
        "Новосибирск": [55.0084, 82.9357], "Екатеринбург": [56.8389, 60.6057],
        "Казань": [55.7961, 49.1064], "Нижний Новгород": [56.3261, 44.0058],
        "Красноярск": [56.0153, 92.8932], "Челябинск": [55.1549, 61.4291],
        "Самара": [53.2001, 50.1500], "Уфа": [54.7431, 55.9678],
        "Ростов-на-Дону": [47.2357, 39.7015], "Омск": [54.9885, 73.3245],
        "Краснодар": [45.0355, 38.9753], "Воронеж": [51.6608, 39.2003],
        "Пермь": [58.0097, 56.2294], "Волгоград": [48.7080, 44.5133],
        "Ярославль": [57.6261, 39.8845], "Рязань": [54.6095, 39.7126]
    };

    var markers = {};
    function update() {
        fetch('alert.json?t=' + new Date().getTime())
            .then(r => r.json())
            .then(d => {
                for (let m in markers) { map.removeLayer(markers[m]); }
                let alerts = document.getElementById('alerts');
                alerts.innerHTML = '';
                
                let active = false;
                for (let p in d) {
                    active = true;
                    let source = d[p].source || "Неизвестно";
                    alerts.innerHTML += `<div class="alert-item"><b>${p}</b>${d[p].status}<div class="source">Источник: ${source}</div></div>`;
                    if (coords[p]) {
                        markers[p] = L.marker(coords[p]).addTo(map)
                            .bindPopup(`<b>${p}</b><br>${d[p].status}<br><small>Источник: ${source}</small>`);
                    }
                }
                if (!active) alerts.innerHTML = 'Все чисто.';
            });
    }

    setInterval(update, 5000);
    update();
</script>
</body>
</html>
