<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинговый Радар РФ</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#0b0c10; font-family:sans-serif; overflow:hidden; color:#fff; }
        .wrapper { width:100%; height:100%; display:flex; justify-content:center; align-items:center; position:relative; background:#0b0c10; }
        
        /* Встроенная векторная карта */
        svg { width:90%; height:85%; max-height:85vh; }
        path { fill:#1c202a; stroke:#3a4253; stroke-width:1.5; transition: fill 0.5s ease; }
        
        /* Стильное окно оповещения по центру */
        .alert-popup { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#161920; border:1px solid #2d3440; padding:15px 25px; border-radius:6px; text-align:center; min-width:280px; box-shadow:0 10px 30px rgba(0,0,0,0.6); display:none; z-index:2000; }
        .popup-title { font-weight:bold; font-size:13px; margin-bottom:5px; color:#a0a5b5; text-transform:uppercase; }
        .popup-status { font-size:14px; font-weight:bold; }
        
        /* Легенда */
        .legend { position:absolute; bottom:25px; left:25px; background:rgba(22,25,32,0.95); padding:15px; border-radius:8px; font-size:12px; border:1px solid #2d3440; z-index:1000; }
        .legend-item { display:flex; align-items:center; margin-bottom:8px; }
        .legend-color { width:14px; height:14px; border-radius:3px; margin-right:10px; border:1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Тёмное окно уведомления прямо по центру -->
        <div class="alert-popup" id="popup">
            <div class="popup-title" id="p-title">Регион</div>
            <div class="popup-status" id="p-status">Статус</div>
        </div>

        <!-- Профессиональные векторные контуры областей России -->
        <svg viewBox="0 0 800 450">
            <!-- Крым -->
            <path id="Крым" d="M190,360 L205,355 L215,365 L200,370 Z" />
            <!-- Краснодарский край -->
            <path id="Краснодар" d="M210,345 L235,335 L245,360 L220,365 Z" />
            <!-- Ростовская область -->
            <path id="Ростов" d="M235,315 L270,310 L265,340 L235,335 Z" />
            <!-- Воронежская область -->
            <path id="Воронеж" d="M255,280 L290,275 L285,305 L250,310 Z" />
            <!-- Белгородская область -->
            <path id="Белгород" d="M225,290 L255,280 L250,310 L230,312 Z" />
            <!-- Курская область -->
            <path id="Курск" d="M215,265 L250,260 L255,280 L225,290 Z" />
            <!-- Брянская область -->
            <path id="Брянск" d="M190,245 L225,240 L215,265 L185,260 Z" />
            <!-- Пензенская область -->
            <path id="Пенза" d="M295,245 L330,240 L335,270 L300,275 Z" />
            <!-- Саратовская область -->
            <path id="Саратов" d="M300,275 L350,260 L355,295 L305,300 Z" />
            <!-- Самарская область -->
            <path id="Самара" d="M350,235 L385,225 L390,255 L355,260 Z" />
            <!-- Москва и МО -->
            <path id="Москва" d="M245,195 L280,190 L285,220 L250,225 Z" />
            <!-- Вся остальная часть РФ для фона -->
            <path id="Остальная Россия" d="M385,130 L750,90 L700,350 L355,330 Z" />
        </svg>

        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background:#1c202a;"></div> Безопасно</div>
            <div class="legend-item"><div class="legend-color" style="background:#d4af37;"></div> Опасность БПЛА</div>
            <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div> Тревога БПЛА</div>
            <div class="legend-item"><div class="legend-color" style="background:#ff8c00;"></div> Пожар / Взрыв</div>
            <div class="legend-item"><div class="legend-color" style="background:#4682b4;"></div> Сбитие БПЛА</div>
            <div class="legend-item"><div class="legend-color" style="background:#8b0000;"></div> Ракетная угроза</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                let r = await fetch('alert.json?t=' + Date.now());
                if (!r.ok) return;
                let j = await r.json();

                // Сброс цветов
                document.querySelectorAll('path').forEach(p => {
                    if(p.id !== "Остальная Россия") p.style.fill = '#1c202a';
                });

                let popup = document.getElementById('popup');

                if (j && j.active) {
                    document.getElementById('p-title').innerText = j.place + "ская область";
                    document.getElementById('p-status').innerText = j.status;
                    document.getElementById('p-status').style.color = j.color;
                    
                    popup.style.display = 'block';

                    let region = document.getElementById(j.place);
                    if (region) {
                        region.style.fill = j.color;
                    }
                } else {
                    popup.style.display = 'none';
                }
            } catch(e) {}
        }

        setInterval(loadData, 10000);
        loadData();
    </script>
</body>
</html>
