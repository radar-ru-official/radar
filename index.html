<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мониторинг</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#0f1115; font-family:sans-serif; overflow:hidden; }
        #map { width:100%; height:100%; }
        .custom-popup .leaflet-popup-content-wrapper { background:#1a1d24; color:#fff; border-radius:6px; padding:5px; border:1px solid #3a3f4d; }
        .custom-popup .leaflet-popup-tip { background:#1a1d24; }
        .popup-title { font-weight:bold; font-size:14px; margin-bottom:5px; color:#a0a5b5; }
        .popup-status { display:flex; align-items:center; font-size:13px; }
        .status-dot { width:8px; height:8px; border-radius:50%; margin-right:8px; display:inline-block; }
        .legend { position:absolute; bottom:20px; left:20px; background:rgba(26,29,36,0.9); padding:15px; border-radius:8px; color:#fff; z-index:1000; font-size:12px; border:1px solid #3a3f4d; }
        .legend-item { display:flex; align-items:center; margin-bottom:8px; }
        .legend-color { width:14px; height:14px; border-radius:3px; margin-right:10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#22252c;"></div> Безопасно</div>
        <div class="legend-item"><div class="legend-color" style="background:#d4af37;"></div> Опасность БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#b22222;"></div> Тревога БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#8b0000;"></div> Ракетная угроза</div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        const map = L.map('map').setView([55.7, 41.6], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);

        let pop = null;

        async function findPlace(name, txt, clr) {
            try {
                // Ищем по базе городов и сел через osm api
                let r = await fetch('https://openstreetmap.org' + encodeURIComponent(name + ', Россия'));
                let d = await r.json();
                if (d && d.length > 0) {
                    let lt = parseFloat(d[0].lat);
                    let ln = parseFloat(d[0].lon);
                    if (pop) map.closePopup(pop);
                    
                    let h = `<div class="popup-title">${name}</div>
                             <div class="popup-status" style="color:${clr};">
                                 <span class="status-dot" style="background-color:${clr};"></span> ${txt}
                             </div>`;
                             
                    pop = L.popup({ className:'custom-popup', closeButton:false }).setLatLng([lt, ln]).setContent(h);
                    map.setView([lt, ln], 9);
                    pop.openOn(map);
                }
            } catch(e) { console.log(e); }
        }

        async function loadData() {
            try {
                let r = await fetch('alert.json?t=' + Date.now());
                let j = await r.json();
                if (j && j.active) {
                    findPlace(j.place, j.status, j.color);
                }
            } catch(e) {}
        }

        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
