<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинговый Радар РФ</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#0b0c10; font-family:sans-serif; overflow:hidden; color:#fff; }
        #map { width:100%; height:100%; background:#0b0c10; }
        .custom-popup .leaflet-popup-content-wrapper { background:#161920; color:#fff; border-radius:6px; padding:10px 15px; border:1px solid #2d3440; box-shadow:0 10px 25px rgba(0,0,0,0.6); }
        .custom-popup .leaflet-popup-tip { background:#161920; border:1px solid #2d3440; }
        .popup-title { font-weight:bold; font-size:13px; margin-bottom:5px; color:#a0a5b5; text-align:center; }
        .popup-status { font-size:14px; font-weight:bold; text-align:center; display:flex; align-items:center; justify-content:center; }
        .legend { position:absolute; bottom:25px; left:25px; background:rgba(22,25,32,0.95); padding:15px; border-radius:8px; font-size:12px; border:1px solid #2d3440; z-index:1000; }
        .legend-item { display:flex; align-items:center; margin-bottom:8px; }
        .legend-color { width:14px; height:14px; border-radius:3px; margin-right:10px; border:1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#1c202a;"></div> Безопасно</div>
        <div class="legend-item"><div class="legend-color" style="background:#d4af37;"></div> Опасность БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div> Тревога БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff8c00;"></div> Пожар / Взрыв</div>
        <div class="legend-item"><div class="legend-color" style="background:#4682b4;"></div> Сбитие БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#8b0000;"></div> Ракетная угроза</div>
    </div>
    <script src="https://unpkg.com"></script>
    <script>
        const map = L.map('map', { zoomControl:false }).setView([53.5, 40.0], 5);
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', { maxZoom: 10 }).addTo(map);
        let geojsonLayer = null;
        let currentPopup = null;
        const regionsData = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature", "properties": { "name": "Пенза" }, "geometry": { "type": "Polygon", "coordinates": [[[44.5,53.8],[46.8,53.9],[47.1,52.5],[45.2,52.3],[44.5,53.8]]] } },
                { "type": "Feature", "properties": { "name": "Белгород" }, "geometry": { "type": "Polygon", "coordinates": [[[35.5,51.0],[38.2,50.8],[38.0,49.8],[35.6,50.1],[35.5,51.0]]] } },
                { "type": "Feature", "properties": { "name": "Курск" }, "geometry": { "type": "Polygon", "coordinates": [[[34.1,52.3],[38.5,51.9],[38.2,51.0],[35.5,51.0],[34.1,52.3]]] } },
                { "type": "Feature", "properties": { "name": "Воронеж" }, "geometry": { "type": "Polygon", "coordinates": [[[38.2,51.9],[42.1,51.3],[41.5,49.6],[38.0,49.8],[38.2,51.9]]] } },
                { "type": "Feature", "properties": { "name": "Брянск" }, "geometry": { "type": "Polygon", "coordinates": [[[31.3,53.4],[35.3,53.2],[34.5,51.9],[32.1,52.0],[31.3,53.4]]] } },
                { "type": "Feature", "properties": { "name": "Крым" }, "geometry": { "type": "Polygon", "coordinates": [[[32.5,45.4],[34.6,46.1],[36.6,45.3],[33.5,44.4],[32.5,45.4]]] } }
            ]
        };
        function style(feature, activeName, activeColor) {
            let isCurrent = feature.properties.name === activeName;
            return {
                fillColor: isCurrent ? activeColor : '#1c202a',
                weight: 1.5,
                opacity: 1,
                color: '#3a4253',
                fillOpacity: isCurrent ? 0.6 : 0.2
            };
        }
        async function loadData() {
            try {
                let r = await fetch('alert.json?t=' + Date.now());
                if (!r.ok) return;
                let j = await r.json();
                if (geojsonLayer) map.removeLayer(geojsonLayer);
                if (currentPopup) map.closePopup(currentPopup);
                let targetPlace = (j && j.active) ? j.place : "";
                let targetColor = (j && j.active) ? j.color : "#1c202a";
                geojsonLayer = L.geoJSON(regionsData, {
                    style: function(feature) { return style(feature, targetPlace, targetColor); }
                }).addTo(map);
                if (j && j.active) {
                    regionsData.features.forEach(f => {
                        if (f.properties.name === j.place) {
                            let bounds = L.geoJSON(f).getBounds();
                            let center = bounds.getCenter();
                            let html = `<div class="popup-title">${j.place}ская область</div>
                                        <div class="popup-status" style="color:${j.color};">${j.status}</div>`;
                            currentPopup = L.popup({ className: 'custom-popup', closeButton: false }).setLatLng(center).setContent(html).openOn(map);
                            map.setView(center, 6);
                        }
                    });
                }
            } catch(e) {}
        }
        setInterval(loadData, 10000);
        loadData();
    </script>
</body>
</html>
