<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОПЕРАТИВНЫЙ RADAR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { flex: 3; height: 100%; }
        #sidebar { flex: 1; padding: 20px; border-left: 1px solid #333; background: #0e0e0e; }
        h2 { margin-top: 0; color: #ff3333; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2>ОПЕРАТИВНАЯ СВОДКА</h2>
        <div id="status">Подключение к спутнику...</div>
    </div>
    <script>
        const map = L.map('map').setView([60, 90], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap, ©CartoDB'
        }).addTo(map);
        document.getElementById('status').innerText = "Система активна. Данные обновляются.";
    </script>
</body>
</html>
