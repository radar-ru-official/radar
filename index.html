<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Monitoring</title>
    <style>
        :root {
            --bg: #121212;
            --panel: rgba(20, 20, 20, 0.9);
            --gold: #c5a059;
            --c-bpla: #ffc107;
            --c-alert: #ff0000;
            --c-missile: #8b0000;
            --c-avia: #a0522d;
            --c-safe: #333;
        }

        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        .flag-line { 
            height: 4px; width: 100%; 
            background: linear-gradient(90deg, #fff 33%, #0039a6 33%, #0039a6 66%, #d52b1e 66%);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #map-box { width: 100vw; height: 100vh; position: relative; }
        svg { width: 100%; height: 100%; }

        .legend { 
            position: absolute; bottom: 20px; left: 20px; 
            background: var(--panel); padding: 15px; border: 1px solid #333;
        }
        .item { display: flex; align-items: center; margin: 5px 0; font-size: 12px; }
        .dot { width: 10px; height: 10px; margin-right: 8px; border-radius: 50%; }

        #time-stamp { 
            position: absolute; bottom: 20px; right: 20px; 
            background: var(--panel); padding: 10px; border: 1px solid var(--gold);
            font-size: 12px; color: var(--gold);
        }

        .tooltip { position: absolute; background: var(--panel); padding: 8px; border: 1px solid var(--gold); display: none; pointer-events: none; z-index: 100; font-size: 12px; }
    </style>
</head>
<body>

<div class="flag-line"></div>

<div id="map-box">
    <!-- Сюда вставляй SVG -->
    <svg id="main-map" viewBox="0 0 1000 600">
        <path id="RU-PEN" class="region" d="..." fill="#333" stroke="#555" />
    </svg>

    <div class="legend">
        <div class="item"><div class="dot" style="background:var(--c-safe)"></div> Безопасно</div>
        <div class="item"><div class="dot" style="background:var(--c-bpla)"></div> Опасность БПЛА</div>
        <div class="item"><div class="dot" style="background:var(--c-alert)"></div> Тревога / Атака</div>
        <div class="item"><div class="dot" style="background:var(--c-missile)"></div> Ракетная угроза</div>
        <div class="item"><div class="dot" style="background:var(--c-avia)"></div> Авиационная опасность</div>
    </div>

    <div id="time-stamp">Последнее обновление: --:--:--</div>
    <div id="tooltip" class="tooltip"></div>
</div>

<script>
    const regionNames = { 'RU-PEN': 'Пензенская область' };
    const threats = {
        'BPLA': { c: 'var(--c-bpla)', t: 'Опасность БПЛА' },
        'ALERT': { c: 'var(--c-alert)', t: 'ТРЕВОГА / АТАКА' },
        'MISSILE': { c: 'var(--c-missile)', t: 'РАКЕТНАЯ УГРОЗА' },
        'AVIA': { c: 'var(--c-avia)', t: 'АВИАЦИОННАЯ ОПАСНОСТЬ' }
    };

    function updateRegion(id, type) {
        const el = document.getElementById(id);
        if (!el) return;
        
        const data = threats[type];
        el.style.fill = data ? data.c : 'var(--c-safe)';
        el.dataset.info = data ? data.t : 'Безопасно';
        
        document.getElementById('time-stamp').innerText = 'Обновлено: ' + new Date().toLocaleTimeString();
    }

    // Обработка наведения
    document.querySelectorAll('.region').forEach(p => {
        p.onmousemove = (e) => {
            const tt = document.getElementById('tooltip');
            tt.style.display = 'block';
            tt.style.left = (e.pageX + 10) + 'px';
            tt.style.top = (e.pageY + 10) + 'px';
            tt.innerHTML = `<strong>${regionNames[p.id] || p.id}</strong><br>${p.dataset.info || 'Безопасно'}`;
        };
        p.onmouseleave = () => document.getElementById('tooltip').style.display = 'none';
    });
</script>
</body>
</html>
