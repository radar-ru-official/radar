<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MONITORING CENTER | LIVE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050505; --panel: rgba(10, 10, 12, 0.95); --uab: #ff0000; --rocket: #b30000; --alarm: #e67e22; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: contrast(1.1) brightness(0.9); }
        
        .dashboard { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 340px; height: 90vh; display: flex; flex-direction: column; background: var(--panel); border: 1px solid #222; box-shadow: 0 0 20px rgba(0,0,0,1); padding: 20px; border-left: 4px solid #333; }
        .header { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .title { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 1px; }
        .status { font-size: 10px; color: #555; margin-top: 5px; text-transform: uppercase; }
        
        #alerts-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        #alerts-container::-webkit-scrollbar { width: 4px; }
        #alerts-container::-webkit-scrollbar-thumb { background: #333; }

        .card { background: #0e0e10; padding: 12px; margin-bottom: 8px; border-left: 3px solid #555; border-radius: 2px; }
        .card.uab { border-color: var(--uab); background: #1a0505; }
        .card.rocket { border-color: var(--rocket); }
        .card.alarm { border-color: var(--alarm); }
        
        .reg { font-weight: 600; font-size: 13px; color: #fff; }
        .txt { font-size: 11px; color: #aaa; margin-top: 3px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="title">СИТУАЦИОННЫЙ ЦЕНТР</div>
        <div class="status" id="last-sync">Инициализация системы...</div>
    </div>
    <div id="alerts-container">
        <div class="card">Ожидание данных...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([50.0, 36.0], 6);
    
    // Темная карта (стиль CartoDB Dark)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function update() {
        fetch('alert.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('alerts-container');
            const sync = document.getElementById('last-sync');
            let html = '';
            let keys = Object.keys(data);
            
            if (keys.length === 0) {
                html = '<div class="card">Все зоны под контролем.</div>';
            } else {
                keys.forEach(k => {
                    let s = data[k].status.toLowerCase();
                    let cls = s.includes('уаб') ? 'uab' : 
                              s.includes('ракетная') ? 'rocket' : 'alarm';
                    html += `
                        <div class="card ${cls}">
                            <div class="reg">${k}</div>
                            <div class="txt">${data[k].status}</div>
                        </div>`;
                });
            }
            container.innerHTML = html;
            sync.innerText = 'ОБНОВЛЕНО: ' + new Date().toLocaleTimeString();
        })
        .catch(() => { document.getElementById('last-sync').innerText = "ОШИБКА СВЯЗИ"; });
    }

    setInterval(update, 3000);
    update();
</script>
</body>
</html>
