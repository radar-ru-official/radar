<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинговый Ситуационный Центр Радар</title>
    <!-- Подключаем стили профессиональных интерактивных карт Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#0b0c10; font-family:sans-serif; overflow:hidden; color:#fff; }
        #map { width:100%; height:100%; background:#0b0c10; }
        
        /* Кастомный стиль всплывающего окна в стиле киберпанк/военного интерфейса */
        .custom-popup .leaflet-popup-content-wrapper { background:#11141a; color:#fff; border-radius:8px; padding:12px 18px; border:1px solid #30363d; box-shadow:0 12px 35px rgba(0,0,0,0.7); }
        .custom-popup .leaflet-popup-tip { background:#11141a; border:1px solid #30363d; }
        .popup-title { font-weight:bold; font-size:14px; margin-bottom:6px; color:#58a6ff; text-transform:uppercase; letter-spacing:1px; }
        .popup-status { font-size:15px; font-weight:bold; margin-bottom:4px; }
        
        /* Легенда системы */
        .legend { position:absolute; bottom:25px; left:25px; background:rgba(17,20,26,0.95); padding:15px 20px; border-radius:8px; font-size:12px; border:1px solid #30363d; z-index:1000; box-shadow:0 10px 25px rgba(0,0,0,0.5); }
        .legend-title { font-weight:bold; font-size:11px; color:#8b949e; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid #21262d; padding-bottom:5px; }
        .legend-item { display:flex; align-items:center; margin-bottom:8px; }
        .legend-color { width:14px; height:14px; border-radius:3px; margin-right:10px; border:1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="legend">
        <div class="legend-title">Мониторинг РФ</div>
        <div class="legend-item"><div class="legend-color" style="background:#21262d;"></div> Безопасно / Норма</div>
        <div class="legend-item"><div class="legend-color" style="background:#d4af37;"></div> Опасность БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div> Пролет БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff8c00;"></div> Пожар / Взрыв</div>
        <div class="legend-item"><div class="legend-color" style="background:#4682b4;"></div> Сбитие БПЛА</div>
        <div class="legend-item"><div class="legend-color" style="background:#8b0000;"></div> Ракетная угроза</div>
    </div>

    <!-- Загружаем библиотеки карты и геокодера -->
    <script src="https://unpkg.com"></script>
    <script>
        // Создаем глобальную интерактивную карту мира с фокусом на Россию
        const map = L.map('map', { zoomControl: true }).setView([55.75, 37.62], 5);
        
        // Загружаем стильную, неубиваемую темную векторную подложку со всеми странами и городами мира
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            maxZoom: 18,
            attribution: ''
        }).addTo(map);

        let activeMarker = null;

        // Поиск координат любого города РФ через открытый глобальный геокодер
        async function getCoordinates(cityName) {
            try {
                let r = await fetch('https://openstreetmap.org' + encodeURIComponent(cityName + ', Россия'));
                let d = await r.json();
                if (d && d.length > 0) {
                    return [parseFloat(d[0].lat), parseFloat(d[0].lon)];
                }
            } catch(e) { console.log(e); }
            return null;
        }

        async function loadData() {
            try {
                let r = await fetch('alert.json?t=' + Date.now());
                if (!r.ok) return;
                let j = await r.json();

                if (j && j.active) {
                    let coords = await getCoordinates(j.place);
                    if (coords) {
                        if (activeMarker) map.removeLayer(activeMarker);

                        let popupHtml = `<div class="popup-title">🚨 ${j.place}</div>
                                         <div class="popup-status" style="color:${j.color};">${j.status}</div>`;

                        // Создаем красивый светящийся маркер-круг на карте вместо обычной стрелки
                        activeMarker = L.circleMarker(coords, {
                            radius: 12,
                            fillColor: j.color,
                            color: '#ffffff',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup(popupHtml, { className: 'custom-popup', closeButton: false }).openPopup();

                        map.setView(coords, 7); // Автоматически и плавно приближаем карту к городу опасности
                    }
                } else {
                    // Если угроз нет, убираем маркер
                    if (activeMarker) {
                        map.removeLayer(activeMarker);
                        activeMarker = null;
                    }
                }
            } catch(e) {}
        }

        // Обновляем данные каждые 12 секунд
        setInterval(loadData, 12000);
        loadData();
    </script>
</body>
</html>
