<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RADAR_DEFENSE_SYSTEM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; }
        #map { height: 100vh; width: 100%; }
        /* Темная панель */
        .ui { position: absolute; top: 20px; left: 20px; z-index: 1000; background: #000; border: 1px solid #222; padding: 15px; width: 300px; box-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div class="ui">
    <div style="color:#00ff41; margin-bottom:10px;">[LIVE_MONITORING_ACTIVE]</div>
    <div id="log">SYSTEM_READY...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([60.0, 50.0], 4);
    // Темная подложка
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    let geoData = null;
    let alerts = {};

    // 1. Грузим границы (файл regions.geojson должен лежать в папке)
    fetch('regions.geojson')
        .then(r => r.json())
        .then(data => { geoData = data; updateMap(); });

    // 2. Грузим угрозы
    function update() {
        fetch('alert.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => { alerts = d; updateMap(); });
    }

    // 3. Рендерим карту
    function updateMap() {
        if (!geoData) return;
        
        // Удаляем старый слой
        if (window.layer) map.removeLayer(window.layer);

        window.layer = L.geoJSON(geoData, {
            style: (feature) => {
                let name = feature.properties.name; // Убедись, что в geojson есть поле name
                let alert = alerts[name];
                
                let fillColor = "#000"; // Черный цвет для всех
                let color = "#1a1a1a";  // Цвет границы
                
                if (alert) {
                    fillColor = alert.status.includes("РАКЕТНАЯ") ? "#ff0000" : "#ffcc00";
                    color = "#fff";
                }
                
                return { fillColor: fillColor, weight: 1, opacity: 1, color: color, fillOpacity: 0.7 };
            },
            onEachFeature: (f, l) => {
                let name = f.properties.name;
                if (alerts[name]) {
                    l.bindPopup(`<b>${name}</b><br>${alerts[name].status}`);
                }
            }
        }).addTo(map);

        // Обновляем лог
        const log = document.getElementById('log');
        log.innerHTML = Object.keys(alerts).map(k => `> ${k}: ${alerts[k].status}`).join('<br>') || "> STATUS: ALL_CLEAR";
    }

    setInterval(update, 5000);
    update();
</script>
</body>
</html>
