<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; filter: grayscale(1) contrast(1.2); }
        .panel { position: absolute; top: 10px; left: 10px; z-index: 1000; width: 300px; background: #111; padding: 10px; border: 1px solid #333; }
        .card { background: #222; padding: 8px; margin-bottom: 5px; border-left: 4px solid #555; }
        .rocket { border-color: #800; } .alarm { border-color: #f55; } .bpla { border-color: #fb0; }
        .head { font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="head">Статус</div>
    <div id="log">Загрузка...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([60, 50], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
    let geo = null;
    fetch('regions.geojson').then(r => r.json()).then(d => { geo = d; });

    function load() {
        fetch('alert.json?t=' + Date.now()).then(r => r.json()).then(data => {
            if (window.layer) map.removeLayer(window.layer);
            if (geo) {
                window.layer = L.geoJSON(geo, {
                    style: (f) => {
                        let st = null;
                        for (let k in data) if (f.properties.name.includes(k)) st = data[k].status;
                        let col = "#222";
                        if (st) {
                            if (st.includes("ракетная")) col = "#800";
                            else if (st.includes("тревога")) col = "#f55";
                            else col = "#fb0";
                        }
                        return { fillColor: col, color: "#000", weight: 0.5, fillOpacity: 0.7 };
                    }
                }).addTo(map);
            }
            let keys = Object.keys(data).sort((a,b) => (data[b].status.includes("ракетная") ? 1 : -1));
            document.getElementById('log').innerHTML = keys.length == 0 ? "Всё чисто" : keys.map(k => {
                let s = data[k].status.toLowerCase();
                let c = s.includes("ракетная") ? "rocket" : (s.includes("тревога") ? "alarm" : "bpla");
                return `<div class="card ${c}"><b>${k}</b><br><small>${data[k].status}</small></div>`;
            }).join('');
        });
    }
    setInterval(load, 5000);
    load();
</script>
</body>
</html>
